<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Profit Planner</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --accent: #fcd535; /* Couleur Binance */
            --text: #eaecef;
            --input-bg: #2b3139;
            --success: #0ecb81;
            --danger: #f6465d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 20px; }
        h3 { border-bottom: 1px solid #474d57; padding-bottom: 5px; font-size: 1rem; color: var(--accent); }

        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #848e9c; }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #474d57;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .result-box {
            background: #2b3139;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .highlight { font-weight: bold; font-size: 1.2rem; display: block; margin-top: 5px; }
        .fee-info { font-size: 0.75rem; color: #848e9c; margin-top: 10px; }

        .flex { display: flex; gap: 10px; }
        .flex > div { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance Calc (BNB Fees)</h2>

    <div class="group">
        <label>Montant investi (€)</label>
        <input type="number" id="investi" placeholder="Ex: 1000" oninput="calculerTout()">
    </div>

    <div class="group">
        <label>Prix d'achat (1 jeton)</label>
        <input type="number" id="prixAchat" placeholder="Ex: 50000" oninput="calculerTout()">
    </div>

    <hr style="border: 0.5px solid #474d57; margin: 20px 0;">

    <h3>1. Profit Actuel</h3>
    <div class="group">
        <label>Prix actuel du marché</label>
        <input type="number" id="prixActuel" placeholder="Ex: 55000" oninput="calculerTout()">
    </div>

    <div class="result-box">
        <label>Gain Net (Frais BNB déduits)</label>
        <span id="gainNet" class="highlight">0.00 €</span>
        <div class="fee-info">Frais totaux estimés: <span id="totalFrais">0.00</span> €</div>
    </div>

    <h3>2. Objectif de Vente</h3>
    <div class="group">
        <label>% de bénéfice souhaité</label>
        <input type="number" id="targetPct" placeholder="Ex: 10" oninput="calculerTout()">
    </div>

    <div class="result-box" style="border-left: 4px solid var(--accent);">
        <label>Prix de vente cible</label>
        <span id="targetPrice" class="highlight" style="color: var(--accent);">0.00 €</span>
        <div class="fee-info">Gain net visé : <span id="targetProfit">0.00</span> €</div>
    </div>
</div>

<script>
    function calculerTout() {
        const investi = parseFloat(document.getElementById('investi').value) || 0;
        const pAchat = parseFloat(document.getElementById('prixAchat').value) || 0;
        const pActuel = parseFloat(document.getElementById('prixActuel').value) || 0;
        const targetPct = parseFloat(document.getElementById('targetPct').value) || 0;

        // Taux Binance avec réduction BNB (0.075%)
        const feeRate = 0.00075;

        if (investi > 0 && pAchat > 0) {
            // --- LOGIQUE PROFIT ACTUEL ---
            // Frais à l'achat
            const fraisAchat = investi * feeRate;
            const quantite = (investi - fraisAchat) / pAchat;
            
            // Frais à la vente (sur la valeur finale)
            const valeurBruteVente = quantite * pActuel;
            const fraisVente = valeurBruteVente * feeRate;
            
            const netFinal = valeurBruteVente - fraisVente;
            const profitNet = netFinal - investi;

            // Affichage Profit
            const gainEl = document.getElementById('gainNet');
            gainEl.innerText = profitNet.toFixed(2) + " €";
            gainEl.style.color = profitNet >= 0 ? "var(--success)" : "var(--danger)";
            document.getElementById('totalFrais').innerText = (fraisAchat + fraisVente).toFixed(2);

            // --- LOGIQUE PRIX CIBLE ---
            if (targetPct > 0) {
                // Pour gagner X%, il faut que le prix monte de (X% + frais cumulés)
                // Formule simplifiée incluant les deux passages de frais
                const multiplicateur = 1 + (targetPct / 100);
                const prixCible = pAchat * (multiplicateur / (1 - (2 * feeRate)));
                
                const profitCible = investi * (targetPct / 100);

                document.getElementById('targetPrice').innerText = prixCible.toFixed(pAchat < 1 ? 6 : 2) + " €";
                document.getElementById('targetProfit').innerText = profitCible.toFixed(2) + " €";
            }
        }
    }
</script>

</body>
</html>
